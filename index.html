<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<style>
:root {
    --pink1: #ffd1dc;
    --pink2: #ff9bb3;
    --accent: #ff4d88;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--pink1), var(--pink2));
    overflow: hidden;
}

/* Card */
.card {
    width: 90%;
    max-width: 350px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    text-align: center;
    position: relative;
}

/* Profile */
.profile {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid white;
    margin-bottom: 20px;
}

/* Text */
.title {
    font-size: 1.4rem;
    color: #b30047;
    font-weight: 600;
}

/* Button */
.music-btn {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* Floating hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 8s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
    <img src="foto.jpg" class="profile">
    <div class="title">
        Sayangg 💖
    </div>
    <div class="subtitle">
        “Kamu sadar nggak sih, sejak kenal kamu hidupku jadi punya warna yang beda?✨"
    </div>
    <button class="music-btn" onclick="playMusic()">Putar Musik 🎵</button>
</div>

<audio id="bgMusic" loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    const music = document.getElementById("bgMusic");
    music.play();
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 5) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 800);
</script>

</body>
</html>
