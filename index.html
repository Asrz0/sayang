<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 2;
            width: 85%;
            max-width: 320px;
        }

        /* Bingkai Hati yang AMAN */
        .photo-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ini fotonya */
        .my-photo {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%; /* Dibuat bulat dulu biar aman di tengah hati */
        }

        /* Ini bingkai hatinya yang membungkus foto */
        .heart-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e91e63;
            /* Jalur hati yang lebar agar wajah tidak tertutup */
            clip-path: path('M110 210c-60-50-100-90-100-140 0-40 30-70 70-70 25 0 45 15 50 35 5-20 25-35 50-35 40 0 70 30 70 70 0 50-40 90-100 140z');
            z-index: -1; /* Berada di belakang foto sebagai background hati */
            transform: scale(1.1);
        }
        
        /* Alternatif: Menimpa foto dengan lubang hati */
        .heart-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 40px solid #ffebee; /* Warna yang sama dengan background luar */
            box-sizing: border-box;
            pointer-events: none;
        }

        h1 {
            color: #d81b60;
            font-size: 1.1rem;
            margin: 15px 0 5px;
        }

        .heart-beat {
            color: #e91e63;
            font-size: 30px;
            animation: pulse 0.8s infinite alternate;
            display: inline-block;
        }

        @keyframes pulse {
            to { transform: scale(1.2); }
        }

        .falling-hearts {
            position: absolute;
            top: -10%;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-wrapper">
            <img src="FOTO.JPG" class="my-photo" alt="Kita">
            <div class="heart-border"></div>
        </div>
        
        <div class="heart-beat">❤️</div>
        <h1>aku sayang banget sama kamu sayang</h1>
        <p style="color: #999; font-size: 0.75rem;">Selamanya dan seterusnya ✨</p>
    </div>

    <script>
        function rain() {
            const h = document.createElement('div');
            h.classList.add('falling-hearts');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            h.style.animationDuration = Math.random() * 3 + 2 + 's';
            h.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(rain, 300);
    </script>
</body>
</html>
