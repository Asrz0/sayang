<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 2;
            width: 85%;
            max-width: 320px;
        }

        /* Bingkai Hati yang Diperbaiki agar Tidak Kepotong */
        .heart-frame {
            width: 220px; /* Ukuran diperbesar sedikit */
            height: 200px;
            margin: 0 auto 15px;
            background-color: #e91e63;
            /* Jalur potong bentuk hati yang lebih presisi */
            clip-path: path('M110 190c-50-45-100-85-100-130 0-35 25-60 60-60 20 0 35 10 40 25 5-15 20-25 40-25 35 0 60 25 60 60 0 45-50 85-100 130z');
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Jika wajah masih kepotong, ganti 'cover' jadi 'contain' */
        }

        h1 {
            color: #d81b60;
            font-size: 1.2rem;
            margin: 10px 0;
            line-height: 1.4;
        }

        .heart-main {
            color: #e91e63;
            font-size: 35px;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        .heart-drop {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-frame">
            <img src="FOTO.JPG" alt="Foto Kita">
        </div>
        
        <div class="heart-main">❤️</div>
        <h1>aku sayang banget sama kamu sayang</h1>
        <p style="color: #888; font-size: 0.8rem;">Selamanya dan seterusnya ✨</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-drop');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 20 + 10 + 'px';
            heart.style.fontSize = size;
            const duration = Math.random() * 3 + 2 + 's';
            heart.style.animationDuration = duration;
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
